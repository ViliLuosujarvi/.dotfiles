# ----- CORE CONTEXT SETTINGS -----
context.properties = {
    default.clock.rate          = 48000
    default.clock.allowed-rates = [ 44100 48000 88200 96000 ]
    default.clock.quantum       = 512
    default.clock.min-quantum   = 64
    default.clock.max-quantum   = 2048
    default.clock.quantum-limit = 8192
    log.level                   = 2
}

# ----- GLOBAL STREAM DEFAULTS -----
stream.properties = {
    resample.quality = 8
    channelmix.normalize = true
    channelmix.mix-lfe   = true
    channelmix.upmix     = true
    channelmix.downmix   = true
    audio.format   = "float32le"
    audio.rate     = 48000
    audio.channels = 2
}

# ----- PULSE AUDIO COMPATIBILITY LAYER -----
pulse.properties = {
    server.address = [ "unix:native" ]
    pulse.min.req     = 128/48000
    pulse.default.req = 512/48000
    pulse.max.req     = 4096/48000
    pulse.min.quantum = 128/48000
    pulse.max.quantum = 4096/48000
    pulse.idle.timeout = 0            # disable suspend
    pulse.default.format   = "float32le"
    pulse.default.rate     = 48000
    pulse.default.channels = 2
    pulse.fix.rate     = false
    pulse.fix.format   = false
    pulse.fix.channels = false
    pulse.allow-module-loading = true
}

# ----- MODULE LOADING -----
pulse.cmd = [
    { cmd = "load-module" args = "module-native-protocol-unix" }
    #{ cmd = "load-module" args = "module-native-protocol-tcp auth-ip-acl=127.0.0.1" }

    { cmd = "load-module" args = "module-device-restore" }
    { cmd = "load-module" args = "module-stream-restore" }
    { cmd = "load-module" args = "module-card-restore" }
    { cmd = "load-module" args = "module-default-device-restore" }
    { cmd = "load-module" args = "module-udev-detect" }
    { cmd = "load-module" args = "module-role-cork" }
    { cmd = "load-module" args = "module-volume-restore" }

    # optional: virtual output
    #{ cmd = "load-module" args = "module-null-sink sink_name=virtual_output sink_properties=device.description=Virtual_Output" }

    # optional: mic loopback
    #{ cmd = "load-module" args = "module-loopback latency_msec=50" }

    # optional: combine sinks
    #{ cmd = "load-module" args = "module-combine-sink sink_name=combined slaves=alsa_output.pci-0000_00_1f.3.analog-stereo,bluez_output.xx" }

    # optional: echo cancel
    #{ cmd = "load-module" args = "module-echo-cancel" }

    # optional: LADSPA effects
    #{ cmd = "load-module" args = "module-ladspa-sink sink_name=fx plugin=mbeq_1197 label=mbeq control=..." }

    # optional: RTP network audio
    #{ cmd = "load-module" args = "module-rtp-send" }
    #{ cmd = "load-module" args = "module-rtp-recv" }
]

# ----- EXTRA EXEC -----
context.exec = [
    # optional: additional service commands
    # { path = "pw-metadata" args = "..." }
]
