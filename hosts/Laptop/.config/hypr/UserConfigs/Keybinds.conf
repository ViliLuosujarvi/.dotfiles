#binde = ALT CTRL, L, resizeactive, 0 60


# -------- Dwindle settings  ------------------

# Focus movement
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, d
bind = $mainMod, K, movefocus, u
bind = $mainMod, L, movefocus, r

# move window tree
bind = ALT, H,  swapwindow, l
bind = ALT, L, swapwindow, r
bind = ALT, K, swapwindow, u
bind = ALT, J, swapwindow, d

# cycle windows 
bind = $mainMod, TAB, cyclenext
bind = $mainMod, A, cyclenext, prev

# RESIZE
binde = $mainMod SHIFT, H, resizeactive, -70 0
binde = $mainMod SHIFT, L, resizeactive, 70 0
binde = $mainMod SHIFT, J, resizeactive, 0 70
binde = $mainMod SHIFT, K, resizeactive, 0 -70

# switch layout
bind = $mainMod, F1, exec, hyprctl keyword general:layout master
bind = $mainMod, F2, exec, hyprctl keyword general:layout dwindle

# change the split orientation
bind = ALT, TAB, layoutmsg, togglesplit

# -------- General applications --------------

#bind = $mainMod, SPACE, exec, $terminal
bind = $mainMod, N, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, $fileManager
bind = CTRL SHIFT, 0 , exit,

bind = $mainMod, R, exec, rofi -show drun -show-icons
bind = $mainMod, F, exec, zen
bind = $mainMod, D, exec, discord --disable-gpu
bind = $mainMod, C, exec, code
bind = $mainMod, W, exec, thunar
bind = $mainMod, S, exec, steam
bind = $mainMod, V, exec, protonvpn-gui

# "gently persuade naughty applications to behave"
bind = CTRL, D, exec, pkill -i -f discord
bind = CTRL, S, exec, pkill -i steam

bind = $mainMod, T, exec, foot btop --config ~/.dotfiles/hosts/Laptop/.config/btop/btop.conf
# -------- Workspaces ------------------------

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# -------- Mouse settings -------------------

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# -------- Volume Settings -----------------

bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# -------- Screenshto utility -------------

#bind = CTRL SHIFT, X, exec, grimblast --notify copysave area
bind = CTRL SHIFT, X , exec, hyprshot -zm region -o ~/Pictures
bind = CTRL SHIFT, A, exec, hyprshot -zm region --clipboard-only
bind = CTRL SHIFT, S, exec, hyprshot -m window

# -------- NumLock -----------------------
bind = , Num_Lock, exec, hyprctl dispatch nop
