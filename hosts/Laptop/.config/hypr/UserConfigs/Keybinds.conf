# -------- Variables -------------------------

$terminal = foot
$fileManager = dolphin
$menu = rofi --show drun

$mainMod = SUPER


# -------- Master settings --------------------

#bind = $mainMod, J, layoutmsg, cyclenext
#bind = $mainMod, K, layoutmsg, cycleprev
#bind = $mainMod SHIFT, J, layoutmsg, rollprev
#bind = $mainMod SHIFT, K, layoutmsg, rollnext
#bind = ALT, J, layoutmsg, swapnext
#bind = ALT, K,layoutmsg ,swapprev
#bind = $mainMod, I, layoutmsg, addmaster
#bind = $mainMod, O, layoutmsg, removemaster
#bind = $mainMod SHIFT, TAB, layoutmsg, swapwithmaster
#bind = $mainMod SHIFT, M, layoutmsg, swapwithmaster
#bind = $mainMod, TAB, layoutmsg, focusmaster
#bind = $mainMod SHIFT, H, layoutmsg, mfact +0.18
#bind = $mainMod SHIFT, L, layoutmsg, mfact -0.18
#bind = $mainMod, H, layoutmsg, mfact +0.03
#bind = $mainMod, L, layoutmsg, mfact -0.03
